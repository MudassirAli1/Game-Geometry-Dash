<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Neon Dash</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a1e;
            color: #00ffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #status {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }
        #progress {
            width: 300px;
            height: 10px;
            background-color: #1a1a3a;
            border: 2px solid #00ffff;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #00ffff;
            transition: width 0.2s;
        }
        canvas {
            border: none;
            width: 100%;
            height: 100%;
            display: none;
        }
    </style>
</head>
<body>
    <div id="status-container">
        <div id="status">DOWNLOADING SYSTEM...</div>
        <div id="progress"><div id="progress-bar"></div></div>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var progressElement = document.getElementById('progress-bar');
        var statusContainer = document.getElementById('status-container');
        var canvasElement = document.getElementById('canvas');

        var Module = {
            print: (function() { return function(text) { console.log(text); }; })(),
            canvas: (function() { return canvasElement; })(),
            setStatus: function(text) {
                if (text === "Ready to start! Please click/touch page") {
                    statusElement.innerHTML = "SYSTEM READY - TAP TO PLAY";
                    progressElement.parentElement.style.display = 'none';
                    
                    // The actual start happens when the user clicks the container
                    statusContainer.onclick = function() {
                        statusContainer.style.display = 'none';
                        canvasElement.style.display = 'block';
                        // Give focus to the canvas
                        canvasElement.focus();
                    };
                } else {
                    statusElement.innerHTML = text;
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                var percentage = left ? (100 * (this.totalDependencies-left) / this.totalDependencies) : 100;
                progressElement.style.width = percentage + '%';
            }
        };
    </script>
    <script async type="text/javascript" src="main.js"></script>
</body>
</html>
